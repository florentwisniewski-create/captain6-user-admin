<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg-gradient" cx="50%" cy="25%" r="65%" fx="50%" fy="25%">
      <stop offset="0%" stop-color="#2a2a40" />
      <stop offset="100%" stop-color="#0a0a0f" />
    </radialGradient>

    <!-- Cyan Glow with Inner Core -->
    <filter id="neon-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur1" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur2" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur3" />
      <feMerge result="blurs">
        <feMergeNode in="blur3" />
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
      </feMerge>
      <feFlood flood-color="#00f0ff" result="color" />
      <feComposite in="color" in2="blurs" operator="in" result="glow" />

      <feMorphology operator="erode" radius="5" in="SourceAlpha" result="eroded" />
      <feFlood flood-color="rgba(255,255,255,0.6)" result="coreColor" />
      <feComposite in="coreColor" in2="eroded" operator="in" result="core" />

      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
        <feMergeNode in="core" />
      </feMerge>
    </filter>

    <!-- Magenta Glow with Inner Core -->
    <filter id="neon-magenta" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur1" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur2" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur3" />
      <feMerge result="blurs">
        <feMergeNode in="blur3" />
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
      </feMerge>
      <feFlood flood-color="#ff00ff" result="color" />
      <feComposite in="color" in2="blurs" operator="in" result="glow" />

      <feMorphology operator="erode" radius="5" in="SourceAlpha" result="eroded" />
      <feFlood flood-color="rgba(255,255,255,0.6)" result="coreColor" />
      <feComposite in="coreColor" in2="eroded" operator="in" result="core" />

      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
        <feMergeNode in="core" />
      </feMerge>
    </filter>

    <!-- White Glow with Inner Core -->
    <filter id="neon-white" x="-500%" y="-500%" width="1100%" height="1100%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur1" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur2" />
      <feMerge result="blurs">
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
      </feMerge>
      <feFlood flood-color="#d0f0ff" result="color" />
      <feComposite in="color" in2="blurs" operator="in" result="glow" />

      <feMorphology operator="erode" radius="4" in="SourceAlpha" result="eroded" />
      <feFlood flood-color="#ffffff" result="coreColor" />
      <feComposite in="coreColor" in2="eroded" operator="in" result="core" />

      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
        <feMergeNode in="core" />
      </feMerge>
    </filter>

    <!-- Yellow Glow -->
    <filter id="neon-yellow" x="-500%" y="-500%" width="1100%" height="1100%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur1" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur2" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="25" result="blur3" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="60" result="blur4" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="120" result="blur5" />
      <feMerge result="blurs">
        <feMergeNode in="blur5" />
        <feMergeNode in="blur5" />
        <feMergeNode in="blur4" />
        <feMergeNode in="blur4" />
        <feMergeNode in="blur3" />
        <feMergeNode in="blur3" />
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
      </feMerge>
      <feFlood flood-color="#facc15" result="color" />
      <feComposite in="color" in2="blurs" operator="in" result="glow" />

      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Blue Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg-gradient)" />

